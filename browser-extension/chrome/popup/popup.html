<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="header-left">
        <img src="../icons/active-16.png" alt="" class="logo">
        <span class="title">OmniGet</span>
      </div>
      <label class="toggle" title="Media detection">
        <input type="checkbox" id="sniffer-toggle">
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div id="page-action" class="page-action hidden">
      <button id="send-page" class="send-page-btn">
        <span id="page-platform" class="platform-name"></span>
        <span class="send-label">Send to OmniGet</span>
      </button>
    </div>

    <div id="media-list" class="media-list">
      <div id="empty-state" class="empty-state">
        <p>No media detected on this page.</p>
        <p class="hint">Play a video or load media to detect it.</p>
      </div>
    </div>

    <footer class="footer">
      <span id="status" class="status"></span>
    </footer>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
